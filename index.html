  <style>
    :root {
      /* Backgrounds — pure neutral greys, no warm tint */
      --bg:      #141414;
      --bg2:     #1C1C1C;
      --bg3:     #1d1b1b;
      --bgtakeaway:     #0d2501;
      --card:    #000000;
      --bgorderitem:#020202;
      --card2:   #422323;
      --itembox2: #380303;
      --card9: #447c00;
      --bgcustome: #2c2120;
      --bgsearch1: #33322d;
      --bgsidebar: #011100;
      --hederbg: #0a6603;

      /* Borders */
      --border:  #6b5656;
      --border2: #2A2A2A;
      --borderoderrow2: #fffb00;

      /* Text — high contrast whites and greys */
      --text:    #ffffff;
      --text2:   #fff6f6;
      --text3:   #ffffff;
      --textsearch3: #da0000;

      /* Accent — one calm amber, used sparingly */
      --amber:      #D4A84B;
      --amber-dim:  rgba(212,168,75,0.12);
      --amber-muted:#8A6E2F;

      /* Status colours — desaturated */
      --green:      #4A9D62;
      --green-dim:  rgba(74,157,98,0.12);
      --red:        #C0392B;
      --red-dim:    rgba(192,57,43,0.12);

      --shadow: 0 4px 20px rgba(0,0,0,0.6);
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'POS Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      background: var(--hederbg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 24px; opacity: 0.85; }
    .header-title h1 {
      font-family: 'POS Sans', sans-serif;
      font-size: 17px; font-weight: 700; color: #ffffff; letter-spacing: 0.2px;
    }
    .header-title p { font-size: 11px; color:  #d9ff04; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-clock {
      font-family: 'POS Sans Mono', monospace;
      font-size: 15px; color: var(--text2);
      background: var(--bg3); padding: 4px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
    }
    .gst-toggle {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer;
      transition: border-color 0.2s;
    }
    .gst-toggle:hover { border-color: var(--amber); }
    .gst-toggle span { font-size: 13px; color: var(--text2); font-weight: 500; }
    .toggle-pill {
      width: 36px; height: 18px; border-radius: 100px;
      background: var(--border); position: relative; transition: background 0.25s;
    }
    .toggle-pill.on { background: var(--amber); }
    .toggle-pill::after {
      content: ''; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--bg2); top: 3px; left: 3px; transition: left 0.25s;
    }
    .toggle-pill.on::after { left: 21px; }

    /* ── MAIN LAYOUT ── */
    .main { display: flex; min-height: calc(100vh - 60px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px; flex-shrink: 0;
      background: var(--bgsidebar);
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      display: flex; flex-direction: column; gap: 4px;
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text3);
      padding: 6px 8px 4px;
    }

    .table-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      text-align: left; width: 100%;
    }
    .table-btn:hover { background: var(--bg3); border-color: var(--border); }
    .table-btn.has-order { background: var(--bg3); border-color: var(--amber-muted); }

    .table-btn-icon { font-size: 16px; flex-shrink: 0; opacity: 0.7; }
    .table-btn-info { flex: 1; min-width: 0; }
    .table-btn-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .table-btn-sub { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .table-btn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border); flex-shrink: 0; transition: background 0.2s;
    }
    .table-btn.has-order .table-btn-dot { background: var(--amber); }

    .takeaway-btn { background: var(--bgtakeaway) !important; border-color: var(--border) !important; }
    .takeaway-btn .table-btn-name { color: var(--amber); }

   /* ── WORKSPACE ── */
  .workspace {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg); overflow: hidden; min-width: 0;
  }

  /* ── MINIMISED STRIP ── */
  .minimised-strip {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    min-height: 0;
  }
  .minimised-strip:empty { display: none; }
  .mini-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    background: var(--bg3); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    font-size: 12px; font-weight: 600; color: var(--text2);
  }
  .mini-chip:hover { border-color: var(--amber); color: var(--amber); }
  .mini-chip.has-items { border-color: var(--amber-muted); color: var(--amber); }
  .mini-chip-total { font-family: 'POS Sans Mono', monospace; font-size: 11px; color: var(--text3); }
  .mini-chip-close {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 13px; padding: 0 0 0 2px; line-height: 1;
  }
  .mini-chip-close:hover { color: var(--red); }

  .workspace-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--text3);
  }
  .workspace-empty .big-icon { font-size: 60px; opacity: 0.2; }
  .workspace-empty p { font-size: 14px; color: var(--text3); }

  /* ── ACTIVE ORDER WINDOW (full workspace) ── */
  .order-windows { flex: 1; display: flex; overflow: hidden; }

  .order-window {
    display: none;
    flex: 1; flex-direction: column;
    background: var(--card);
    overflow: hidden;
    animation: slideIn 0.18s ease;
  }
  .order-window.active { display: flex; }
  @keyframes slideIn { from { opacity:0; transform: translateX(10px); } to { opacity:1; transform: none; } }

  .window-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .window-header-icon { font-size: 18px; opacity: 0.8; }
  .window-header-title { flex: 1; font-size: 18px; font-weight: 700; color: var(--text); }
  .window-header-total {
    font-family: 'POS Sans Mono', monospace;
    font-size: 20px; color: var(--amber); font-weight: 700;
  }
  .window-controls { display: flex; gap: 6px; }
  .win-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text2); cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .win-btn:hover { background: var(--border); color: var(--text); }
  .win-btn-close:hover { background: var(--red-dim); border-color: var(--red); color: var(--red); }

  /* ── WINDOW BODY — two column layout ── */
  .window-body {
    flex: 1; display: flex; overflow: hidden; gap: 0;
  }

  /* LEFT — menu panel */
  .menu-panel {
    width: 45%; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg);
  }
  .menu-panel-inner {
    flex: 1; overflow-y: auto; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* RIGHT — order panel */
  .order-panel {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden; background: var(--card);
  }
  .order-panel-inner {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .order-panel-footer {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg2); flex-shrink: 0;
  }

  /* bigger menu chips for full screen */
  .menu-chip {
    display: flex; align-items: baseline; gap: 8px;
    padding: 8px 14px; border-radius: var(--radius-sm);
    background: var(--bg3); border: 1px solid var(--border2);
    cursor: pointer; transition: background 0.12s, border-color 0.12s;
  }
  .menu-chip:hover { background: var(--card9); border-color: var(--border); }
  .menu-chip-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    font-family: 'POS Sans', sans-serif;
  }
  .menu-chip-price {
    font-size: 13px; color: var(--amber);
    font-family: 'POS Sans Mono', monospace;
  }

  /* bigger order item rows */
  .order-item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    background: var(--bg3); border: 1px solid var(--border2);
  }
  .order-item-name {
    flex: 1; font-size: 15px; color: var(--text);
    font-family: 'POS Sans', sans-serif;
  }
  .qty-btn {
    width: 30px; height: 30px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--itembox2); color: var(--text); cursor: pointer;
    font-size: 17px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .qty-num {
    font-family: 'POS Sans Mono', monospace;
    font-size: 15px; font-weight: 700; color: var(--text);
    min-width: 24px; text-align: center;
  }
  .item-total {
    font-family: 'POS Sans Mono', monospace;
    font-size: 14px; color: var(--amber); min-width: 60px; text-align: right;
  }

  /* cat-header bigger */
  .cat-header {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 13px; border-radius: var(--radius-sm);
    background: var(--bg3); border: 1px solid var(--border2);
    cursor: pointer; transition: background 0.12s, border-color 0.12s; user-select: none;
    font-size: 14px;
    width: auto; margin: 0;
  }
  .cat-header:hover { background: var(--card9); border-color: var(--border); }
  .cat-header.open { border-color: var(--amber-muted); background: var(--card9); }
  .cat-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .cat-count { font-size: 12px; color: var(--text3); }
    /* ── MENU SEARCH ── */
    .menu-search {
      width: 100%; padding: 8px 11px; border-radius: var(--radius-sm);
      background: var(--bgsearch1); border: 1px solid var(--border);
      color: var(--textsearchbox ); font-family: 'POS Sans', sans-serif; font-size: 13px;
    }
    .menu-search:focus { outline: none; border-color: var(--amber-muted); }
    .menu-search::placeholder { color: var(--text3); }
    .search-results { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 0; }

    /* ── CATEGORY ACCORDION ── */
    .menu-cat-scroll { max-height: 260px; overflow-y: auto; display: flex; flex-wrap: wrap; flex-direction: row; gap: 10px; padding: 4px; align-content: flex-start; }
    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-radius: var(--radius-sm);
      background: var(--bg3); border: 1px solid var(--border2);
      cursor: pointer; transition: background 0.15s, border-color 0.15s; user-select: none;
    }
    .cat-header:hover { background: var(--card2); border-color: var(--border); }
    .cat-header.open { border-color: var(--amber-muted); background: var(--card2); }
    .cat-header-left { display: flex; align-items: center; gap: 7px; }
    .cat-icon { font-size: 13px; opacity: 0.8; }
    .cat-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .cat-count { font-size: 11px; color: var(--text3); }
    .cat-arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
    .cat-header.open .cat-arrow { transform: rotate(180deg); color: var(--amber); }
    .cat-items { display: none; flex-wrap: wrap; gap: 5px; padding: 7px 4px 3px; width: 100%; border-left: 2px solid var(--amber-muted); margin-bottom: 4px; }
    .cat-items.open { display: flex; }

    /* ── MENU CHIPS ── */
    .menu-chip {
      display: flex; align-items: baseline; gap: 5px;
      padding: 5px 10px; border-radius: var(--radius-sm);
      background: var(--bg3); border: 1px solid var(--border2);
      cursor: pointer; transition: background 0.12s, border-color 0.12s;
    }
    .menu-chip:hover { background: var(--card9); border-color: var(--border); }
    .menu-chip-name {
      font-size: 16px; font-weight: 500; color: var(--text2);
      font-family: 'POS Sans', sans-serif;
    }
    .menu-chip-price { font-size: 11px; color: var(--amber); font-family: 'POS Sans Mono', monospace; }

    /* ── ORDER ITEMS LIST ── */
    .order-items-list { display: flex; flex-direction: column; gap: 3px; ; overflow-y: auto; }
    .order-items-list::-webkit-scrollbar { width: 4px; }
    .order-items-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .order-item-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: var(--radius-sm);
      background: var(--bgorderitem); border: 1px solid var(--borderoderrow2);
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .order-item-name {
      flex: 1; font-size: 13px; color: var(--text);
      font-family: 'POS Sans', sans-serif;
    }
    .qty-controls { display: flex; align-items: center; gap: 5px; }
    .qty-btn {
      width: 24px; height: 24px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--itembox2); color: var(--text); cursor: pointer;
      font-size: 15px; font-weight: 600; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-num { font-family: 'POS Sans Mono', monospace; font-size: 13px; font-weight: 600; color: var(--text); min-width: 20px; text-align: center; }
    .item-total { font-family: 'POS Sans Mono', monospace; font-size: 13px; color: var(--amber); min-width: 54px; text-align: right; }
    .remove-item { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px; line-height: 1; }
    .remove-item:hover { color: var(--red); }

    /* ── ORDER SUMMARY ── */
    .order-summary {
      border-top: 1px solid var(--border2); padding-top: 10px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: center; }
    .summary-label { font-size: 13px; color: var(--text3); }
    .summary-value { font-family: 'POS Sans Mono', monospace; font-size: 13px; color: var(--text2); }
    .summary-total-label { font-size: 15px; font-weight: 700; color: var(--text); }
    .summary-total-value { font-family: 'POS Sans Mono', monospace; font-size: 16px; font-weight: 700; color: var(--amber); }

    .discount-row { display: flex; align-items: center; gap: 8px; }
    .discount-label { font-size: 13px; color: var(--text3); white-space: nowrap; }
    .discount-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 9px;
      color: var(--text); font-size: 13px; font-family: 'POS Sans Mono', monospace;
    }
    .discount-input:focus { outline: none; border-color: var(--amber-muted); }

    /* ── BUTTONS ── */
    .window-actions { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px; border-radius: var(--radius-sm);
      border: none; cursor: pointer; font-family: 'POS Sans', sans-serif;
      font-size: 14px; font-weight: 600; transition: all 0.15s;
    }
    .btn-print { background: var(--amber); color: #111; }
    .btn-print:hover { filter: brightness(1.1); }
    .btn-clear { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    /* ── NOTES FIELD ── */
    .notes-field {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 7px 10px; font-family: 'POS Sans', sans-serif; font-size: 13px;
      color: var(--text2); resize: none; width: 100%; line-height: 1.4;
    }
    .notes-field:focus { outline: none; border-color: var(--amber-muted); }
    .notes-field::placeholder { color: var(--text3); }

    .empty-order { font-size: 13px; color: var(--text3); text-align: center; padding: 18px 8px; }

    /* ── KOT ── */
    .kot-check {
      width: 15px; height: 15px; flex-shrink: 0; cursor: pointer;
      accent-color: var(--amber); margin-right: 2px;
    }
    .kot-hint {
      font-size: 11px; color: var(--text3); text-align: right;
      padding: 2px 2px 0; letter-spacing: 0.2px;
    }
    .btn-kot {
      width: 100%; padding: 9px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text2); font-family: 'POS Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; text-align: center;
      letter-spacing: 0.2px;
    }
    .btn-kot:hover { border-color: var(--amber-muted); color: var(--amber); }

    /* ── LOG PANEL ── */
    .log-panel {
      width: 270px; flex-shrink: 0;
      background: var(--bg2); border-left: 1px solid var(--border);

      width: 42px;

  const LS_ORDERS     = 'mgpos_orders';

  const LS_GST        = 'mgpos_gst';

  // ─── PERSIST HELPERS ─────────────────────────────────────────────────────────
  function saveState() {
    try {
      // Filter out edit_ windows — they are temporary and must never be restored on reload
      var ordersToSave = {};
      Object.keys(orders).forEach(function(k) {
        if (!k.startsWith('edit_')) ordersToSave[k] = orders[k];
      });
      localStorage.setItem(LS_ORDERS,    JSON.stringify(ordersToSave));
      localStorage.setItem(LS_SALES_LOG, JSON.stringify(salesLog));
      localStorage.setItem(LS_COUNTER,   billCounter);
      localStorage.setItem(LS_GST,       gstEnabled ? '1' : '0');
    } catch(e) { console.warn('localStorage save failed', e); }
  }

  function loadState() {
    try {
      const g = localStorage.getItem(LS_GST);
      if (g !== null) gstEnabled = g === '1';
      const c = localStorage.getItem(LS_COUNTER);
      if (c) billCounter = parseInt(c) || 1;
      const sl = localStorage.getItem(LS_SALES_LOG);
      if (sl) salesLog = JSON.parse(sl);
      const od = localStorage.getItem(LS_ORDERS);
      if (od) {
        const saved = JSON.parse(od);
        Object.assign(orders, saved);
      }
    } catch(e) { console.warn('localStorage load failed', e); }

  // Track open categories per window
  const openCats = {};

  function toggleCat(tableId, catId) {
    if (!openCats[tableId]) openCats[tableId] = new Set();
    const s = openCats[tableId];
    const hdr = document.getElementById(`cathdr-${tableId}-${catId}`);
    const items = document.getElementById(`catitems-${tableId}-${catId}`);
    if (!hdr || !items) return;
    if (s.has(catId)) {
      s.delete(catId);
      hdr.classList.remove('open');
      items.classList.remove('open');
    } else {
      s.add(catId);
      hdr.classList.add('open');
      items.classList.add('open');
    }
  }

  function _hl(text, q) {
    if (!q) return text;
    var i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i === -1) return text;
    return text.slice(0,i)
      + '<mark style="background:var(--amber);color:#111;border-radius:2px;padding:0 1px;">'
      + text.slice(i, i+q.length) + '</mark>'
      + text.slice(i+q.length);
  }

  function searchMenu(tableId, query) {
    const catDiv = document.getElementById('catscroll-' + tableId);
    const resultsDiv = document.getElementById('searchresults-' + tableId);
    if (!query.trim()) {
      catDiv.style.display = '';
      resultsDiv.style.display = 'none';
      resultsDiv.innerHTML = '';
      return;
    }
    catDiv.style.display = 'none';
    resultsDiv.style.display = 'flex';
    const q = query.trim().toLowerCase();
    const matches = MENU.filter(item => item.name.toLowerCase().includes(q) || item.id.toLowerCase().includes(q));
    if (!matches.length) {
      resultsDiv.innerHTML = '<div style="font-size:11px;color:var(--textsearch3);padding:6px">No items found</div>';
      return;

  // ─── OPEN / FOCUS ORDER ──────────────────────────────────────────────────────
function openOrder(tableId) {
  document.getElementById('emptyState').style.display = 'none';

  if (!orders[tableId]) {
    orders[tableId] = { items: [], notes: '', minimized: false };
  }

  // Minimise all other non-edit windows
  Object.keys(orders).forEach(id => {
    if (id !== tableId && !id.startsWith('edit_') && orders[id]) {
      orders[id].minimized = true;
    }
  });

  orders[tableId].minimized = false;

  // Re-render all windows and update strip
  Object.keys(orders).forEach(id => {
    if (orders[id]) renderOrderWindow(id);
  });

  setActiveWindow(tableId);
  updateSidebarButton(tableId);
  updateMiniStrip();
  saveState();
}

function setActiveWindow(tableId) {
  // Hide all windows
  document.querySelectorAll('.order-window').forEach(w => w.classList.remove('active'));
  // Show only the active one
  const el = document.getElementById('win-' + tableId);
  if (el) el.classList.add('active');
}

function updateMiniStrip() {
  const strip = document.getElementById('miniStrip');
  const minimised = Object.keys(orders).filter(id =>
    orders[id] && orders[id].minimized && !id.startsWith('edit_')
  );
  if (!minimised.length) { strip.innerHTML = ''; return; }

  strip.innerHTML = minimised.map(id => {
    const order = orders[id];
    const subtotal = calcSubtotal(order);
    const gst = gstEnabled ? subtotal * GST_RATE / 100 : 0;
    const total = Math.max(0, subtotal + gst - (order.discount || 0));
    const hasItems = order.items.length > 0;
    return `
      <div class="mini-chip ${hasItems ? 'has-items' : ''}" onclick="openOrder('${id}')">
        <span>${TABLE_LABELS[id]}</span>
        ${hasItems ? `<span class="mini-chip-total">₹${total.toFixed(0)}</span>` : ''}
        <button class="mini-chip-close" onclick="event.stopPropagation();closeOrder('${id}')" title="Close">✕</button>
      </div>
    `;
  }).join('');
}

  // ─── ORDER ACTIONS ────────────────────────────────────────────────────────────
  function addItem(tableId, itemId) {
    const order = orders[tableId];
    const existing = order.items.find(it => it.id === itemId);
    if (existing) existing.qty++;
    else order.items.push({ id: itemId, qty: 1, kotSelected: true, kotSentQty: 0 });
    renderOrderWindow(tableId);
    updateSidebarButton(tableId);
    saveState();
  }
  function addCustomItem(tableId) {
    const nameEl  = document.getElementById('custom-name-'  + tableId);
    const priceEl = document.getElementById('custom-price-' + tableId);
    const name  = nameEl.value.trim();
    const price = parseFloat(priceEl.value) || 0;
    if (!name) { nameEl.focus(); return; }
    if (price <= 0) { priceEl.focus(); return; }
    orders[tableId].items.push({
      id: 'custom_' + Date.now(),
      name, price, qty: 1,
      custom: true, kotSelected: true, kotSentQty: 0
    });

    nameEl.value  = '';
    priceEl.value = '';
    nameEl.focus();
    renderOrderWindow(tableId);
    updateSidebarButton(tableId);
    saveState();
  }
  function changeQty(tableId, idx, delta) {
    const order = orders[tableId];
    order.items[idx].qty += delta;
    if (order.items[idx].qty <= 0) order.items.splice(idx, 1);
    renderOrderWindow(tableId);
    updateSidebarButton(tableId);
    saveState();
  }

  function removeItem(tableId, idx) {
    orders[tableId].items.splice(idx, 1);
    renderOrderWindow(tableId);
    updateSidebarButton(tableId);
    saveState();
  }

  function setDiscount(tableId, val) {
    orders[tableId].discount = parseFloat(val) || 0;
    renderOrderWindow(tableId);
    saveState();
  }

    if (confirm('Clear all items from ' + TABLE_LABELS[tableId] + '?')) {
      orders[tableId] = { items: [], notes: '', minimized: false, discount: 0 };
      renderOrderWindow(tableId);

  function closeOrder(tableId) {
    // edit_ windows: just close silently, no confirm, no sidebar update
    if (tableId.startsWith('edit_')) {
      delete orders[tableId];
      const editWin = document.getElementById('win-' + tableId);
      if (editWin) editWin.remove();
      const realKeys = Object.keys(orders).filter(function(k){ return !k.startsWith('edit_'); });
      if (realKeys.length === 0 && Object.keys(orders).length === 0) {
        document.getElementById('emptyState').style.display = '';
      }
      return; // don't saveState — edit windows are never persisted
    }
    const order = orders[tableId];
    if (order && order.items && order.items.length > 0) {
      const total = calcSubtotal(order);
      const gst = gstEnabled ? total * GST_RATE / 100 : 0;
      const grand = (total + gst).toFixed(2);
      if (!confirm('⚠️ ' + TABLE_LABELS[tableId] + ' has ' + order.items.length + ' item(s) worth ₹' + grand + '.\n\nAre you sure you want to close this order? It will be lost.')) {
        return;
      }
    }
    delete orders[tableId];
    const el = document.getElementById('win-' + tableId);
    if (el) el.remove();
    updateSidebarButton(tableId);
// If closed window was active, show another or show empty
  const remaining = Object.keys(orders).filter(id => !orders[id].minimized && !id.startsWith('edit_'));
  if (remaining.length > 0) {
    setActiveWindow(remaining[0]);
  } else {
    document.querySelectorAll('.order-window').forEach(w => w.classList.remove('active'));
    if (Object.keys(orders).filter(id => !id.startsWith('edit_')).length === 0) {
      document.getElementById('emptyState').style.display = '';

  // ─── IFRAME PRINT HELPER (no popup blocker issues) ───────────────────────────
  function printViaIframe(bodyHTML, cssText) {
    try {
      const iframe = document.getElementById('printFrame');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + cssText + '</style></head><body>' + bodyHTML + '</body></html>');
      doc.close();
      setTimeout(function() {
        try {
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        } catch(e) {
          // Fallback: open in new window
          const w = window.open('', '_blank', 'width=400,height=600');
          if (w) {
            w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + cssText + '</style></head><body>' + bodyHTML + '</body></html>');
            w.document.close();
            w.focus();
            w.print();
            setTimeout(function(){ w.close(); }, 1000);
          }
        }
      }, 300);
    } catch(e) {
      // Final fallback: new window
      const w = window.open('', '_blank', 'width=400,height=600');
      if (w) {
        w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' + cssText + '</style></head><body>' + bodyHTML + '</body></html>');
        w.document.close();
        w.focus();
        w.print();
        setTimeout(function(){ w.close(); }, 1000);
      }
    }
  }

      ...it,
      kotQty: it.qty - (it.kotSentQty || 0)

    const now = new Date();

  function calcSubtotal(order) {
    return order.items.reduce((sum, it) => {
      if (it.custom) return sum + (it.price * it.qty);
      const def = MENU.find(m => m.id === it.id);
      return sum + (def ? def.price * it.qty : 0);
    }, 0);
  }

        ? `<div class="r-row r-bold"><span>GST @ ${GST_RATE}%</span><span>₹${gstAmt.toFixed(2)}</span></div>`
        : ``}
      ${discount > 0 ? `<div class="r-row r-bold"><span>Discount</span><span>-₹${discount.toFixed(2)}</span></div>` : ''}
      <hr class="r-solid">
      <div class="r-row r-bold r-total"><span>GRAND TOTAL</span><span>₹${total.toFixed(2)}</span></div>
      <hr class="r-solid">
      <div class="r-center r-bold" style="margin-top:6px">धन्यवाद! — पुन्हा भेटूया —</div>
    `;

    document.getElementById('receiptContent').innerHTML = html;
    document.getElementById('printOverlay').classList.add('show');

    // Store pending log entry — only committed when Print button is actually clicked
    pendingLogEntry = {
      billNo, tableId, label: TABLE_LABELS[tableId],
      date: dateStr, time: timeStr,
      items: order.items.map(it => {
        const name = it.custom ? it.name : (MENU.find(m => m.id === it.id) || {}).name || it.id;
        return `${name}(${it.qty})`;
      }),
      subtotal, gstAmt, discount, total, gstEnabled,
      snapshot: JSON.parse(JSON.stringify(order.items)),

      snapNotes: order.notes || ''
    };

  function doPrint() {
    const receiptHTML = document.getElementById('receiptContent').innerHTML;
    const css = `
      body { font-family: 'Courier New', monospace; font-size: 15px; padding: 10px; width: 280px; }
      .r-center { text-align: center; } .r-bold { font-weight: 800; }
      .r-line { border: none; border-top: 1px dashed #999; margin: 6px 0; }
      .r-solid { border: none; border-top: 2px solid #333; margin: 6px 0; }

      .r-total { font-size: 18px; font-weight: 800; }
      .r-small { font-size: 10px; color: #00000; }
    `;
    printViaIframe(receiptHTML, css);

    // Commit log entry only now — on actual print
    if (pendingLogEntry) {
      pendingLogEntry.logIndex = salesLog.length; // store position so edit can find it
      salesLog.push(pendingLogEntry);
      billCounter++;
      pendingLogEntry = null;
      renderLog();
    }

    // Clear table after print (for edit orders: just remove the temp window)
    if (pendingClearId) {
      if (pendingClearId.startsWith('edit_')) {
        const editWin2 = document.getElementById('win-' + pendingClearId);
        if (editWin2) editWin2.remove();
        delete orders[pendingClearId];
        // Show empty state only if no real (non-edit) windows remain
        var realKeys = Object.keys(orders).filter(function(k){ return !k.startsWith('edit_'); });
        if (realKeys.length === 0) {
          document.getElementById('emptyState').style.display = '';
        }
      } else {
        orders[pendingClearId] = { items: [], notes: '', minimized: false, discount: 0 };
        renderOrderWindow(pendingClearId);
        updateSidebarButton(pendingClearId);
      }
      pendingClearId = null;
    }
    saveState();
    document.getElementById('printOverlay').classList.remove('show');
  }

  function closePrint() {
    document.getElementById('printOverlay').classList.remove('show');
    // Discard pending log entry — Close means "don't print, don't log"
    pendingLogEntry = null;
    pendingClearId = null;

  }

        + '</div>'
        + '<div class="log-entry-meta">'

        + '</div>'
        + '<div class="log-entry-items">' + e.items.join(', ') + '</div>'

  var _receiptCSS = 'body{font-family:"Courier New",monospace;font-size:15px;padding:10px;width:280px;}'

 var win = document.getElementById('win-' + editId);

  // ─── SAVE & REPRINT — called from the edit order window ─────────────────────
  function saveAndReprint(editId) {
    var order = orders[editId];
    if (!order || !order.items.length) { alert('No items in this order!'); return; }

    var logIdx = order._editLogIdx;
    var origEntry = salesLog[logIdx];
    if (!origEntry) { alert('Original log entry not found.'); return; }

    // Recalculate
    var subtotal = calcSubtotal(order);
    var gstAmt   = origEntry.gstEnabled ? +(subtotal * GST_RATE / 100).toFixed(2) : 0;
    var discount = parseFloat(order.discount || 0) || 0;
    var total    = Math.max(0, subtotal + gstAmt - discount);

    // Build updated log entry (keep original billNo, date, time, table)
    var updatedEntry = {
      billNo:      origEntry.billNo,
      tableId:     origEntry.tableId,
      label:       origEntry.label,
      date:        origEntry.date,
      time:        origEntry.time,
      gstEnabled:  origEntry.gstEnabled,
      logIndex:    logIdx,
      items: order.items.map(function(it) {
        var name = it.custom ? it.name : ((MENU.find(function(m){return m.id===it.id;})||{}).name||it.id);
        return name + '(' + it.qty + ')';
      }),
      subtotal: subtotal, gstAmt: gstAmt, discount: discount, total: total,
      snapshot:    JSON.parse(JSON.stringify(order.items)),
      snapDiscount: discount,
      snapNotes:   order.notes || '',
      edited:      true
    };

    // Replace in salesLog in-place — today's total auto-corrects
    salesLog[logIdx] = updatedEntry;
    saveState();
    renderLog();

    // Show receipt preview (uses standard print overlay)
    var now = new Date();
    var receiptHTML = buildReceiptFromEntry(updatedEntry);
    document.getElementById('receiptContent').innerHTML = receiptHTML;
    document.getElementById('printOverlay').classList.add('show');

    // Store enough for doPrint to just print (log already committed)
    pendingClearId   = editId;   // close edit window after print
    pendingLogEntry  = null;     // already committed above

    showToast('✅ ' + origEntry.billNo + ' updated — Sales log adjusted', 3000);
  }

  function exportLog() {
    if (!salesLog.length) { alert('No sales to export yet.'); return; }
    const rows = [['Bill No','Table','Date','Time','Subtotal','GST','Discount','Total','Items']];
    salesLog.forEach(e => {
      rows.push([e.billNo, e.label.replace(/[📦🪑]/g,'').trim(), e.date, e.time,
        e.subtotal.toFixed(2), e.gstAmt.toFixed(2), e.discount.toFixed(2),
        e.total.toFixed(2), e.items.join(' | ')]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
    // '\uFEFF' is the UTF-8 BOM — tells Excel to read as UTF-8, fixing Hindi characters
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'maa_gayatri_sales_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // Close print overlay on background click
  document.getElementById('printOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePrint();
  });

  // ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────────────
  var _KEY_MAP = {
    '1':'table1','2':'table2','3':'table3','4':'table4','5':'table5',
    '6':'table6','7':'table7','8':'table8','9':'table9','0':'table10',
    '-':'table11','=':'table12','[':'table13',']':'table14','\\':'table15',
    'p':'takeaway','q':'takeaway'
  };
  document.addEventListener('keydown', function(ev) {
    var tag = (ev.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || ev.target.isContentEditable) return;
    if (ev.ctrlKey || ev.metaKey || ev.altKey) return;
    if (ev.key === 'Escape') {
      if (document.getElementById('printOverlay').classList.contains('show')) { closePrint(); return; }
    }
    var tId = _KEY_MAP[ev.key] || _KEY_MAP[(ev.key||'').toLowerCase()];
    if (tId) {
      ev.preventDefault();
      openOrder(tId);
      var btn = document.getElementById('btn-' + tId);
      if (btn) btn.scrollIntoView({ block: 'nearest' });
      showToast('⌨ ' + (TABLE_LABELS[tId] || tId), 1200);
    }
  });

  // ─── PREVENT DATA LOSS ON REFRESH / CLOSE ────────────────────────────────────
  window.addEventListener('beforeunload', function(e) {
    saveState(); // final save
    const hasActiveOrders = Object.values(orders).some(o => o && o.items && o.items.length > 0);
    if (hasActiveOrders) {
      const msg = 'You have active table orders! Are you sure you want to leave?';
      e.preventDefault();
      e.returnValue = msg;
      return msg;
    }
  });

  // Save notes when user types (debounced)
  let notesSaveTimer = null;
  document.addEventListener('input', function(e) {
    if (e.target && e.target.classList.contains('notes-field')) {
      clearTimeout(notesSaveTimer);
      notesSaveTimer = setTimeout(() => saveState(), 600);
    }
  });

  // ─── RESTORE STATE ON PAGE LOAD ──────────────────────────────────────────────
  (function restoreOnLoad() {
    loadState();

    // Restore GST pill UI
    const pill = document.getElementById('gstPill');
    if (pill) pill.className = 'toggle-pill' + (gstEnabled ? ' on' : '');

    // Restore open order windows
    const activeOrders = Object.keys(orders).filter(id => orders[id] && orders[id].items !== undefined);
if (activeOrders.length > 0) {
    document.getElementById('emptyState').style.display = 'none';
    // Minimise all except last one
    activeOrders.forEach((tableId, i) => {
      orders[tableId].minimized = i < activeOrders.length - 1;
      renderOrderWindow(tableId);
      updateSidebarButton(tableId);
    });
    const lastActive = activeOrders[activeOrders.length - 1];
    setActiveWindow(lastActive);
    updateMiniStrip();
    showToast(`✅ Restored ${activeOrders.length} active order(s) from last session`);
  }

    // Restore sales log
    if (salesLog.length > 0) renderLog();
  })();

  // ─── TOAST NOTIFICATION ───────────────────────────────────────────────────────
  function showToast(msg, duration = 4000) {
    const existing = document.getElementById('mgToast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.id = 'mgToast';
    t.textContent = msg;
    Object.assign(t.style, {
      position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
      background: '#333333', color: 'white', padding: '10px 20px',
      borderRadius: '100px', fontSize: '13px', fontWeight: '600',
      zIndex: '99999', boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
      animation: 'fadeIn 0.3s ease', fontFamily: 'DM Sans, sans-serif',
      whiteSpace: 'nowrap'
    });
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.4s'; setTimeout(() => t.remove(), 400); }, duration);
  }

<!-- ── WAITER ORDER RECEIVER ── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.5/mqtt.min.js"></script>
<script>
(function() {
  const TOPIC = 'mghr/orders/v1';
  const _seen = new Set();

  const _client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
    clientId: 'mghr_pos_' + Math.random().toString(36).slice(2,9),
    clean: true, reconnectPeriod: 4000, connectTimeout: 10000
  });

  _client.on('connect', () => {
    _client.subscribe(TOPIC, { qos: 1 });
    showToast('📡 Waiter orders: Connected', 2000);
  });

  _client.on('message', (topic, payload) => {
    try {
      const order = JSON.parse(payload.toString());
      if (_seen.has(order.id)) return; // ignore duplicates
      _seen.add(order.id);

      // Convert table number to tableId used by the app
      const tableId = order.table === 'Parcel' ? 'takeaway' : 'table' + order.table;

      // Open the table if not already open
      openOrder(tableId);

      // Add each item as a custom item (with price 0 — can be set manually)
      order.items.forEach(item => {
        // Check if item exists in MENU by name match
        const menuItem = MENU.find(m =>
          m.name.trim().toLowerCase() === item.name.trim().toLowerCase()
        );

        if (menuItem) {
          // Add from menu properly (with correct price)
          for (let i = 0; i < item.qty; i++) {
            addItem(tableId, menuItem.id);
          }
        } else {
          // Add as custom item with 0 price
          for (let i = 0; i < item.qty; i++) {
            orders[tableId].items.push({
              id: 'custom_' + Date.now() + '_' + Math.random(),
              name: item.name,
              price: 0,
              qty: 1,
              custom: true,
              kotSelected: true,
              kotSentQty: 0
            });
          }
          renderOrderWindow(tableId);
          updateSidebarButton(tableId);
          saveState();
        }
      });

      // Bell sound
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.12, 0.24].forEach(d => {
          const osc = ctx.createOscillator(), g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = 880; osc.type = 'sine';
          g.gain.setValueAtTime(0.3, ctx.currentTime + d);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.5);
          osc.start(ctx.currentTime + d); osc.stop(ctx.currentTime + d + 0.6);
        });
      } catch(e) {}

      const label = order.table === 'Parcel' ? 'Parcel' : 'Table ' + order.table;
      showToast('🔔 New order — ' + label + ' (by ' + order.by + ')', 4000);

    } catch(e) { console.error('MQTT parse error:', e); }
  });
})();
</script>
