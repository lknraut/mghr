<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MGHR Order</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.5/mqtt.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111210;--surface:#1c1b18;--surface2:#242320;--surface3:#2c2b27;
  --border:#35332d;--border2:#413f38;
  --gold:#f0a500;--gold2:#e07b00;--goldbg:rgba(240,165,0,.1);--goldborder:rgba(240,165,0,.25);
  --red:#e05555;--redbg:rgba(224,85,85,.1);
  --green:#4db87a;--greenbg:rgba(77,184,122,.1);
  --text:#f2ede0;--text2:#a09880;--text3:#6a6455;
  --radius:14px;--radius-sm:9px;--radius-xs:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Baloo 2','Noto Sans Devanagari',sans-serif;display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hdr-brand{display:flex;align-items:center;gap:8px;}
.hdr-logo{font-size:1.35rem;}
.hdr-name{font-size:1rem;font-weight:800;letter-spacing:.02em;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.conn-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:.72rem;font-weight:600;color:var(--text3);transition:all .3s;}
.conn-pill.ok{color:var(--green);border-color:rgba(77,184,122,.3);background:var(--greenbg);}
.conn-pill.err{color:var(--red);}
.conn-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.conn-pill.ok .conn-dot{animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── NAV TABS ── */
.nav{flex-shrink:0;display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-tab{flex:1;min-width:70px;padding:11px 6px 9px;text-align:center;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;position:relative;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-badge{position:absolute;top:6px;right:50%;transform:translateX(120%);background:var(--gold);color:#000;border-radius:10px;font-size:.6rem;font-weight:800;padding:1px 5px;min-width:16px;line-height:16px;}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen.active{display:flex;flex-direction:column;}

/* ── SCREEN 0: Setup ── */
.setup-wrap{padding:20px 16px;display:flex;flex-direction:column;gap:14px;}
.field-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.field-sel,.field-inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:15px 16px;color:var(--text);font-family:'Baloo 2','Noto Sans Devanagari',sans-serif;font-size:1rem;font-weight:500;outline:none;transition:border .2s;appearance:none;}
.field-sel:focus,.field-inp:focus{border-color:var(--gold);}
.field-sel option{background:#1c1b18;}
.info-chip{background:var(--goldbg);border:1px solid var(--goldborder);border-radius:var(--radius-sm);padding:10px 14px;font-size:.8rem;color:var(--gold);display:none;}
.info-chip.on{display:block;}
.go-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--radius);padding:17px;color:#1a1500;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.04em;cursor:pointer;box-shadow:0 4px 20px rgba(240,165,0,.2);transition:transform .12s,box-shadow .12s;}
.go-btn:active{transform:scale(.97);box-shadow:none;}

/* ── SCREEN 1: Menu ── */
.menu-sticky{position:sticky;top:0;z-index:20;background:var(--bg);padding:10px 16px 0;}
.search-box{position:relative;margin-bottom:10px;}
.search-box input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 36px 11px 40px;color:var(--text);font-family:'Baloo 2','Noto Sans Devanagari',sans-serif;font-size:.92rem;outline:none;transition:border .2s;}
.search-box input:focus{border-color:var(--gold);}
.s-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;}
.s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:1.1rem;cursor:pointer;display:none;padding:4px;}

.cat-scroller{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;}
.cat-scroller::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:7px 13px;font-size:.78rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap;}
.cat-pill.active{background:var(--goldbg);border-color:var(--goldborder);color:var(--gold);}
.cat-pill-count{font-size:.65rem;background:var(--surface3);border-radius:8px;padding:1px 6px;color:var(--text3);}
.cat-pill.active .cat-pill-count{background:rgba(240,165,0,.15);color:var(--gold);}

.menu-body{padding:0 16px 16px;flex:1;}

/* Chip grid */
.chips-grid{display:flex;flex-wrap:wrap;gap:8px;padding:10px 0;}
.m-chip{display:inline-flex;align-items:stretch;background:var(--surface2);border:1.5px solid var(--border);border-radius:22px;overflow:hidden;transition:border .15s,background .15s;max-width:100%;}
.m-chip.active{border-color:var(--gold);background:var(--goldbg);}
.chip-body{display:flex;flex-direction:column;padding:8px 10px 8px 13px;cursor:pointer;min-width:0;}
.chip-body:active{background:rgba(255,255,255,.04);}
.chip-nm{font-size:.82rem;font-weight:600;line-height:1.3;color:var(--text);}
.chip-pr{font-size:.68rem;color:var(--text3);margin-top:1px;}
.chip-active .chip-pr{color:var(--gold2);}
.chip-ctrl{display:flex;align-items:center;border-left:1.5px solid var(--border);flex-shrink:0;}
.chip-add-btn{background:none;border:none;color:var(--gold);font-size:1.3rem;font-weight:700;width:36px;height:100%;min-height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.chip-add-btn:active{background:var(--goldbg);}
.chip-qty-wrap{display:flex;align-items:center;}
.chip-minus,.chip-plus{background:none;border:none;font-size:1.1rem;font-weight:700;width:32px;height:100%;min-height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.chip-minus{color:var(--red);}
.chip-minus:active{background:var(--redbg);}
.chip-plus{color:var(--green);}
.chip-plus:active{background:var(--greenbg);}
.chip-qn{font-size:.85rem;font-weight:800;color:var(--gold);min-width:22px;text-align:center;}

/* Search result list */
.sr-list{display:flex;flex-direction:column;gap:7px;padding:10px 0;}
.sr-item{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;gap:12px;transition:border .15s;}
.sr-item.active{border-color:var(--gold);background:var(--goldbg);}
.sr-info{flex:1;min-width:0;}
.sr-name{font-size:.9rem;font-weight:600;}
.sr-price{font-size:.75rem;color:var(--text3);margin-top:2px;}
.sr-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sr-add{background:var(--goldbg);border:1px solid var(--goldborder);color:var(--gold);border-radius:var(--radius-xs);padding:7px 16px;font-size:.8rem;font-weight:700;cursor:pointer;}
.sr-qctrl{display:flex;align-items:center;gap:8px;}
.sr-btn{width:30px;height:30px;border-radius:var(--radius-xs);border:none;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sr-btn.m{background:var(--redbg);color:var(--red);}
.sr-btn.p{background:var(--greenbg);color:var(--green);}
.sr-qn{font-size:.88rem;font-weight:800;color:var(--gold);min-width:20px;text-align:center;}

/* ── SCREEN 2: Cart ── */
.cart-top{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
.cart-ttl{font-size:1rem;font-weight:800;}
.cart-sub{font-size:.75rem;color:var(--text3);}
.cart-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);padding:40px;}
.cart-empty-icon{font-size:2.5rem;opacity:.3;}
.cart-empty-txt{font-size:.88rem;}
.cart-list{flex:1;overflow-y:auto;}
.c-item{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);gap:10px;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.c-name{flex:1;font-size:.9rem;font-weight:600;line-height:1.3;}
.c-unit{font-size:.72rem;color:var(--text3);}
.c-qty-wrap{display:flex;align-items:center;gap:8px;}
.c-btn{width:28px;height:28px;border-radius:var(--radius-xs);border:none;font-size:.95rem;font-weight:700;cursor:pointer;}
.c-btn.m{background:var(--redbg);color:var(--red);}
.c-btn.p{background:var(--greenbg);color:var(--green);}
.c-qn{font-size:.88rem;font-weight:800;color:var(--gold);min-width:22px;text-align:center;}
.c-total{font-size:.82rem;font-weight:700;color:var(--text2);min-width:42px;text-align:right;}
.cart-footer{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 16px;}
.cart-summary{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cs-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}
.cs-val{font-size:1.2rem;font-weight:800;color:var(--gold);}
.send-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--radius);padding:16px;color:#1a1500;font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.04em;cursor:pointer;box-shadow:0 4px 20px rgba(240,165,0,.2);transition:transform .12s;}
.send-btn:active{transform:scale(.97);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── SCREEN 3: History ── */
.hist-top{padding:16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hist-ttl{font-size:1rem;font-weight:800;}
.hist-clear{background:var(--redbg);border:1px solid rgba(224,85,85,.3);color:var(--red);border-radius:var(--radius-xs);padding:7px 14px;font-size:.78rem;font-weight:700;cursor:pointer;}
.hist-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);padding:40px;}
.hist-empty-icon{font-size:2.5rem;opacity:.3;}
.hist-scroll{flex:1;overflow-y:auto;padding:0 16px 16px;}
.h-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;animation:fadeUp .25s ease;}
.h-card-top{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:rgba(240,165,0,.05);border-bottom:1px solid var(--border);}
.h-table{font-size:.88rem;font-weight:800;color:var(--gold);}
.h-meta{font-size:.7rem;color:var(--text3);}
.h-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem;}
.h-row:last-child{border-bottom:none;}
.h-item-name{color:var(--text);}
.h-item-qty{color:var(--text3);font-size:.78rem;}
.h-item-amt{color:var(--text2);font-size:.8rem;font-weight:600;}
.h-total{padding:10px 14px;display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;border-top:1px solid var(--border);background:rgba(240,165,0,.04);}
.h-total-amt{color:var(--gold);}

/* ── BOTTOM SEND BAR (menu screen) ── */
.send-bar{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:none;align-items:center;gap:10px;}
.sb-count{background:var(--gold);color:#1a1500;border-radius:50%;width:26px;height:26px;font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-view{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px;color:var(--text);font-family:'Baloo 2',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;text-align:center;}
.sb-send{flex:2;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--radius-sm);padding:12px;color:#1a1500;font-family:'Baloo 2',sans-serif;font-size:.88rem;font-weight:800;letter-spacing:.04em;cursor:pointer;}
.sb-send:disabled{opacity:.4;}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green);color:#fff;padding:10px 22px;border-radius:30px;font-weight:700;font-size:.86rem;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">🍛</span>
    <span class="hdr-name">MGHR</span>
  </div>
  <div class="conn-pill" id="connPill">
    <div class="conn-dot"></div>
    <span id="connTxt">Connecting…</span>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-tab active" id="tab0" onclick="goScreen(0)">Setup</div>
  <div class="nav-tab" id="tab1" onclick="goScreen(1)">Menu</div>
  <div class="nav-tab" id="tab2" onclick="goScreen(2)">
    Cart <span class="nav-badge" id="cartBadge" style="display:none">0</span>
  </div>
  <div class="nav-tab" id="tab3" onclick="goScreen(3)">History</div>
</div>

<!-- SCREEN 0: SETUP -->
<div class="screen active" id="screen0">
  <div class="setup-wrap">
    <div>
      <div class="field-label">Table Number</div>
      <select class="field-sel" id="tableNum">
        <option value="">— Select Table —</option>
        <script>for(let i=1;i<=15;i++)document.write(`<option value="${i}">Table ${i}</option>`)</script>
        <option value="Parcel">🚗 Parcel / Takeaway</option>
      </select>
    </div>
    <div>
      <div class="field-label">Waiter Name</div>
      <input type="text" class="field-inp" id="waiterName" placeholder="Your name…" autocomplete="name">
    </div>
    <div class="info-chip" id="infoChip"></div>
    <button class="go-btn" onclick="goToMenu()">Go to Menu →</button>
  </div>
</div>

<!-- SCREEN 1: MENU -->
<div class="screen" id="screen1">
  <div class="menu-sticky">
    <div class="search-box">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInp" placeholder="Search menu items…" oninput="doSearch(this.value)">
      <button class="s-clear" id="sClear" onclick="clearSearch()">×</button>
    </div>
    <div class="cat-scroller" id="catScroller"></div>
  </div>
  <div class="menu-body" id="menuBody"></div>
</div>

<!-- SCREEN 2: CART -->
<div class="screen" id="screen2">
  <div class="cart-top">
    <div class="cart-ttl">Your Order</div>
    <div class="cart-sub" id="cartSub">0 items</div>
  </div>
  <div class="cart-empty" id="cartEmpty">
    <div class="cart-empty-icon">🛒</div>
    <div class="cart-empty-txt">No items added yet</div>
  </div>
  <div class="cart-list" id="cartList" style="display:none"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-summary">
      <div class="cs-label">Approx Total</div>
      <div class="cs-val" id="cartTotal">₹0</div>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendOrder()">SEND ORDER TO KITCHEN →</button>
  </div>
</div>

<!-- SCREEN 3: HISTORY -->
<div class="screen" id="screen3">
  <div class="hist-top">
    <div class="hist-ttl">📋 Order History</div>
    <button class="hist-clear" onclick="clearHistory()">🗑 Clear</button>
  </div>
  <div class="hist-empty" id="histEmpty">
    <div class="hist-empty-icon">📋</div>
    <div>No orders sent yet</div>
  </div>
  <div class="hist-scroll" id="histScroll" style="display:none"></div>
</div>

<!-- SEND BAR (shown on menu screen) -->
<div class="send-bar" id="sendBar">
  <div class="sb-count" id="sbCount">0</div>
  <button class="sb-view" onclick="goScreen(2)">View Cart</button>
  <button class="sb-send" id="sbSend" onclick="sendOrder()">SEND ORDER →</button>
</div>

<div class="toast" id="toast"></div>

// ── STATE ─────────────────────────────────────────────────
let cart = {};
let activeCat = CATS[0].id;
let tableNum = '', waiterName = '';
let history = JSON.parse(localStorage.getItem('mghr_hist') || '[]');

// ── MQTT ──────────────────────────────────────────────────
const mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
  clientId: 'waiter_' + Math.random().toString(36).slice(2,9),
  clean: true, reconnectPeriod: 4000, connectTimeout: 10000
});
mqttClient.on('connect', () => setConn('ok','Connected'));
mqttClient.on('reconnect', () => setConn('','Reconnecting…'));
mqttClient.on('error', () => setConn('err','Error'));

function setConn(cls, txt) {
  const p = document.getElementById('connPill');
  p.className = 'conn-pill ' + cls;
  document.getElementById('connTxt').textContent = txt;
}

// ── SCREENS ───────────────────────────────────────────────
let curScreen = 0;
function goScreen(n) {
  document.querySelectorAll('.screen').forEach((s,i) => s.classList.toggle('active', i===n));
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===n));
  curScreen = n;
  document.getElementById('sendBar').style.display = (n===1 && (tableNum||waiterName)) ? 'flex' : 'none';
  if (n===2) renderCart();
  if (n===3) renderHistory();
}

// ── SETUP ─────────────────────────────────────────────────
function goToMenu() {
  tableNum = document.getElementById('tableNum').value;
  waiterName = document.getElementById('waiterName').value.trim();
  if (!tableNum) return toast('Select a table!', true);
  if (!waiterName) return toast('Enter your name!', true);
  const chip = document.getElementById('infoChip');
  chip.textContent = `🪑 ${tableNum==='Parcel'?'Parcel':'Table '+tableNum}  ·  👤 ${waiterName}`;
  chip.classList.add('on');
  buildCatPills();
  renderCat(activeCat);
  document.getElementById('sendBar').style.display = 'flex';
  goScreen(1);
}

// ── CATEGORY PILLS ────────────────────────────────────────
function buildCatPills() {
  document.getElementById('catScroller').innerHTML = CATS.map(c =>
    `<div class="cat-pill${c.id===activeCat?' active':''}" id="cp_${c.id}" onclick="selectCat('${c.id}')">
      ${c.icon} ${c.label}
      <span class="cat-pill-count">${c.items.length}</span>
    </div>`
  ).join('');
}

function selectCat(id) {
  activeCat = id;
  document.getElementById('searchInp').value = '';
  document.getElementById('sClear').style.display = 'none';
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  const cp = document.getElementById('cp_'+id);
  if (cp) { cp.classList.add('active'); cp.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  renderCat(id);
}

function renderCat(catId) {
  const cat = CATS.find(c => c.id===catId);
  document.getElementById('menuBody').innerHTML =
    `<div class="chips-grid">${(cat ? cat.items : []).map(renderChip).join('')}</div>`;
}

// ── CHIPS ─────────────────────────────────────────────────
function renderChip(item) {
  const q = cart[item.id] || 0;
  const on = q > 0;
  return `<div class="m-chip${on?' active':''}" id="chip_${item.id}">
    <div class="chip-body" onclick="if(!${on}) addOne('${item.id}')">
      <div class="chip-nm">${item.name}</div>
      ${item.price ? `<div class="chip-pr">₹${item.price}</div>` : ''}
    </div>
    <div class="chip-ctrl">
      ${on
        ? `<div class="chip-qty-wrap">
            <button class="chip-minus" onclick="changeQty('${item.id}',-1)">−</button>
            <span class="chip-qn">${q}</span>
            <button class="chip-plus" onclick="changeQty('${item.id}',1)">+</button>
          </div>`
        : `<button class="chip-add-btn" onclick="addOne('${item.id}')">＋</button>`
      }
    </div>
  </div>`;
}

function addOne(id) { changeQty(id, 1); }

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateBadge();
  refreshItem(id);
}

function refreshItem(id) {
  const item = FLAT.find(i => i.id===id);
  if (!item) return;
  const chip = document.getElementById('chip_'+id);
  if (chip) chip.outerHTML = renderChip(item);
  const sr = document.getElementById('sr_'+id);
  if (sr) sr.outerHTML = renderSrItem(item);
}

function updateBadge() {
  const total = Object.values(cart).reduce((a,b)=>a+b,0);
  const badge = document.getElementById('cartBadge');
  const sbCount = document.getElementById('sbCount');
  badge.textContent = total;
  sbCount.textContent = total;
  badge.style.display = total > 0 ? 'inline-flex' : 'none';
}

// ── SEARCH ────────────────────────────────────────────────
function doSearch(q) {
  document.getElementById('sClear').style.display = q ? 'block' : 'none';
  if (!q.trim()) { renderCat(activeCat); return; }
  const lower = q.toLowerCase();
  const res = FLAT.filter(i => i.name.toLowerCase().includes(lower) || i.id.toLowerCase().includes(lower));
  document.getElementById('menuBody').innerHTML = res.length
    ? `<div class="sr-list">${res.map(renderSrItem).join('')}</div>`
    : `<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:.88rem">No items found</div>`;
}

function clearSearch() {
  document.getElementById('searchInp').value = '';
  document.getElementById('sClear').style.display = 'none';
  renderCat(activeCat);
}

function renderSrItem(item) {
  const q = cart[item.id] || 0;
  const on = q > 0;
  return `<div class="sr-item${on?' active':''}" id="sr_${item.id}">
    <div class="sr-info">
      <div class="sr-name">${item.name}</div>
      ${item.price ? `<div class="sr-price">₹${item.price}</div>` : ''}
    </div>
    <div class="sr-ctrl">
      ${on
        ? `<div class="sr-qctrl">
            <button class="sr-btn m" onclick="changeQty('${item.id}',-1)">−</button>
            <span class="sr-qn">${q}</span>
            <button class="sr-btn p" onclick="changeQty('${item.id}',1)">+</button>
          </div>`
        : `<button class="sr-add" onclick="changeQty('${item.id}',1)">+ Add</button>`
      }
    </div>
  </div>`;
}

// ── CART ──────────────────────────────────────────────────
function renderCart() {
  const keys = Object.keys(cart);
  document.getElementById('cartSub').textContent = keys.length + ' item type' + (keys.length===1?'':'s');
  if (!keys.length) {
    document.getElementById('cartEmpty').style.display = 'flex';
    document.getElementById('cartList').style.display = 'none';
    document.getElementById('cartFooter').style.display = 'none';
    return;
  }
  document.getElementById('cartEmpty').style.display = 'none';
  document.getElementById('cartList').style.display = 'block';
  document.getElementById('cartFooter').style.display = 'block';
  let total = 0;
  document.getElementById('cartList').innerHTML = keys.map(id => {
    const item = FLAT.find(i => i.id===id);
    const name = item ? item.name : id;
    const price = item && item.price ? item.price : 0;
    const line = price * cart[id];
    total += line;
    return `<div class="c-item">
      <div style="flex:1;min-width:0">
        <div class="c-name">${name}</div>
        ${price ? `<div class="c-unit">₹${price} each</div>` : ''}
      </div>
      <div class="c-qty-wrap">
        <button class="c-btn m" onclick="changeQty('${id}',-1);renderCart()">−</button>
        <span class="c-qn">${cart[id]}</span>
        <button class="c-btn p" onclick="changeQty('${id}',1);renderCart()">+</button>
      </div>
      <div class="c-total">${line ? '₹'+line : '—'}</div>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = total ? '₹'+total : '—';
}

// ── SEND ──────────────────────────────────────────────────
function sendOrder() {
  const keys = Object.keys(cart);
  if (!keys.length) return toast('Add items first!', true);
  if (!tableNum) return toast('Set table in Setup tab!', true);
  if (!mqttClient.connected) return toast('Not connected — wait!', true);

  const items = keys.map(id => {
    const item = FLAT.find(i => i.id===id);
    return { id, name: item ? item.name : id, qty: cart[id], price: item ? item.price : 0 };
  });
  const orderId = Date.now().toString();
  const payload = JSON.stringify({
    table: tableNum, by: waiterName, items,
    time: new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
    date: new Date().toLocaleDateString('en-IN'),
    id: orderId
  });

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sbSend').disabled = true;

  mqttClient.publish('mghr/orders/v1', payload, {qos:1}, err => {
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sbSend').disabled = false;
    if (err) return toast('Send failed!', true);

    // Save history
    history.unshift({id:orderId, table:tableNum, by:waiterName, items,
      time: new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
      date: new Date().toLocaleDateString('en-IN')});
    if (history.length > 100) history.pop();
    localStorage.setItem('mghr_hist', JSON.stringify(history));

    cart = {};
    updateBadge();
    toast('✓ Sent — ' + (tableNum==='Parcel'?'Parcel':'Table '+tableNum));
    renderCat(activeCat);
    goScreen(1);
  });
}

// ── HISTORY ───────────────────────────────────────────────
function renderHistory() {
  if (!history.length) {
    document.getElementById('histEmpty').style.display = 'flex';
    document.getElementById('histScroll').style.display = 'none';
    return;
  }
  document.getElementById('histEmpty').style.display = 'none';
  document.getElementById('histScroll').style.display = 'block';
  document.getElementById('histScroll').innerHTML = history.map(o => {
    const total = o.items.reduce((s,i) => s + (i.price||0)*i.qty, 0);
    return `<div class="h-card">
      <div class="h-card-top">
        <span class="h-table">${o.table==='Parcel'?'🚗 Parcel':'🪑 Table '+o.table}</span>
        <span class="h-meta">${o.date} · ${o.time} · ${o.by}</span>
      </div>
      ${o.items.map(i => `
        <div class="h-row">
          <span class="h-item-name">${i.name}</span>
          <span class="h-item-qty">×${i.qty}</span>
          <span class="h-item-amt">${i.price ? '₹'+(i.price*i.qty) : '—'}</span>
        </div>`).join('')}
      ${total ? `<div class="h-total"><span>Total</span><span class="h-total-amt">₹${total}</span></div>` : ''}
    </div>`;
  }).join('');
}

function clearHistory() {
  if (!history.length) return toast('History is already empty', true);
  if (confirm('Clear all order history?')) {
    history = [];
    localStorage.removeItem('mghr_hist');
    renderHistory();
    toast('History cleared');
  }
}

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show'+(err?' err':'');
  setTimeout(() => t.className='toast', 2800);
}

// Init cat pills on load for when user navigates back
buildCatPills();
</script>
